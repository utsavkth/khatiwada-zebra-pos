services:
  zebra-pos:
    build: .
    image: zebra-pos
    container_name: zebra-pos
    restart: unless-stopped
    labels:
      # This image is built locally from source (no registry push), so
      # Watchtower can never find a newer version to pull — it was just
      # polling and reporting "not updated" every day. Deploys are
      # deliberate: git pull + docker compose up -d --build via Termius,
      # not automatic.
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      # Bound to localhost only: Caddy (host-networked) proxies
      # https://uk-homeserver.tailea48bb.ts.net:8444 -> 127.0.0.1:5051.
      # Nothing on the LAN/tailnet can reach the plain-http port directly,
      # so the padlocked :8444 address is the only way in.
      - "127.0.0.1:5051:5000"
    volumes:
      # THE SAME volume as the original nepal-pos container — both apps read
      # and write the one live store.db/sales.db (WAL mode handles the two
      # processes; see db.py).
      - /srv/dev-disk-by-uuid-d83cca89-bc12-4315-a166-686c581461cf/Docker-Data/nepal-pos:/app/data
    environment:
      # Session signing key, from a .env file next to this compose file (not
      # committed). Compose fails fast with this message if it's missing.
      # The admin password is NOT set here — it's the same hashed password the
      # original app stored in the shared settings table.
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env}
